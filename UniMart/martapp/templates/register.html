{% extends 'base.html' %}
{% block content %}

<div class="max-w-md mx-auto my-16 bg-white shadow-lg rounded-xl p-8">
  <h2 class="text-3xl font-bold text-center text-slate-800 mb-8">
    Create Account
  </h2>
  <form method="POST" class="space-y-5">

    {% csrf_token %}

    <div>
      <label class="block mb-2 font-medium">First Name</label>
      <input type="text" name="first_name" required
        class="w-full border rounded-lg px-4 py-3 outline-none focus:border-blue-500">
    </div>

    <div>
      <label class="block mb-2 font-medium">Last Name</label>
      <input type="text" name="last_name" required
        class="w-full border rounded-lg px-4 py-3 outline-none focus:border-blue-500">
    </div>

    <div>
      <label class="block mb-2 font-medium">Username</label>
      <input type="text" name="username" required
        class="w-full border rounded-lg px-4 py-3 outline-none focus:border-blue-500">
    </div>

    <div>
      <label class="block mb-2 font-medium">Email</label>
      <input type="email" name="email" required
        class="w-full border rounded-lg px-4 py-3 outline-none focus:border-blue-500">
    </div>

    <div>
      <label class="block mb-2 font-medium">Phone</label>
      <input type="text" name="phone" required
        class="w-full border rounded-lg px-4 py-3 outline-none focus:border-blue-500">
    </div>

    <div>
      <label class="block mb-2 font-medium">Address</label>
      <input type="text" name="address" required
        class="w-full border rounded-lg px-4 py-3 outline-none focus:border-blue-500">
    </div>

    <div>
      <label class="block mb-2 font-medium">Password</label>
      <input type="password" name="password1" required
        class="w-full border rounded-lg px-4 py-3 outline-none focus:border-blue-500">
    </div>

    <div>
      <label class="block mb-2 font-medium">Confirm Password</label>
      <input type="password" name="password2" required
        class="w-full border rounded-lg px-4 py-3 outline-none focus:border-blue-500">
    </div>

    <div class="flex items-center gap-2">
      <input type="checkbox" name="is_active" required>
      <label>I agree to the Terms & Conditions</label>
    </div>

    <button type="submit"
      class="w-full bg-slate-800 hover:bg-slate-700 text-white py-3 rounded-lg font-semibold duration-300">
      Register
    </button>

    <p class="text-center">Already have an account?
      <a href="{% url 'login' %}" class="text-blue-600 hover:underline">
        Login
      </a>
    </p>
  </form>
</div>

{% endblock %}
